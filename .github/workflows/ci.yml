name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install X11 deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxfixes-dev libxrender-dev
      - name: Run tests
        run: zig build test
      - name: Build Linux
        run: zig build -Doptimize=ReleaseSmall
      - name: Build Windows (cross)
        run: zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-windows

  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Run tests (with Windows clipboard tests)
        run: zig build test
