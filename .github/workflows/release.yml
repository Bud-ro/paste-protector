name: Release

on:
  push:
    tags:
      - '*_*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build
        run: zig build -Doptimize=ReleaseSmall -Dtarget=x86_64-windows
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: zig-out/bin/paste-protector.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Install X11 deps
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxfixes-dev libxrender-dev
      - name: Build
        run: zig build -Doptimize=ReleaseSmall
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: zig-out/bin/paste-protector

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/paste-protector.exe
            artifacts/linux/paste-protector
          generate_release_notes: true
